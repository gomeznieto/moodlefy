<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formateador de Código</title>
    <style>
        body { font-family: sans-serif; margin: 2em; }
        .error { color: red; }
        .form-group { margin-bottom: 1em; }
    </style>
</head>
<body>
    <h1>Formateador de Código</h1>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="language">Lenguaje:</label>
            <select id="language" name="language">
                <option value="cpp">C++</option>
                <option value="cs">C#</option>
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="sql">SQL</option>
                <option value="css">CSS</option>
                <option value="html">HTML</option>
                <option value="json">JSON</option>
            </select>
        </div>
        <div class="form-group">
            <label for="theme">Tema:</label>
            <select id="theme" name="theme">
                <option value="monokai">Monokai</option>
                <option value="github">GitHub</option>
                <option value="dracula">Dracula</option>
                <option value="native">Native</option>
            </select>
        </div>
        <div class="form-group">
            <label for="linenos">Mostrar números de línea:</label>
            <input type="checkbox" id="linenos" name="linenos">
        </div>
        <hr>
        <div class="form-group">
            <label for="file">Subir archivo:</label>
            <input type="file" id="file" name="file" accept=".cpp,.h,.py,.js,.html,.json">
        </div>
        <hr>
        <div class="form-group">
            <label for="code">O pegar código aquí:</label><br>
            <textarea id="code" name="code" rows="15" cols="80"></textarea>
        </div>
        <br>
        <button type="submit">Formatear</button>
    </form>
    
    {% if formatted_html %}
        <h2>HTML Resultante:</h2>
        <button type="button" onclick="copyToClipboard()">Copiar HTML</button>
        <textarea id="html-result" readonly rows="15" style="width: 100%; font-family: monospace;">{{ formatted_html }}</textarea>
    {% endif %}
    
    <script>
        function copyToClipboard() {
            const textarea = document.getElementById('html-result');
            navigator.clipboard.writeText(textarea.value).then(function() {
                alert('¡Copiado!');
            }, function(err) {
                console.error('Error al copiar: ', err);
            });
        }
    </script>
</body>
</html>
